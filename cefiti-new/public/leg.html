<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Legislação - CEFiTI</title>
		<style>
			body {
				font-family:
					'Segoe UI',
					-apple-system,
					BlinkMacSystemFont,
					'Roboto',
					'Helvetica Neue',
					serif;
				line-height: 1.6;
				color: #333;
				max-width: 800px;
				margin: 0 auto;
				padding: 40px 20px;
				background-color: #f9f9f9;
			}
			#root {
				background: white;
				padding: 40px;
				box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
				border-radius: 8px;
				border: 1px solid #eee;
			}
			md-block {
				display: block;
			}
			/* Styling for official document look */
			h1,
			h2,
			h3 {
				color: #1a1a1a;
				border-bottom: 1px solid #eee;
				padding-bottom: 10px;
			}
			pre {
				background: #f4f4f4;
				padding: 15px;
				border-radius: 4px;
				overflow-x: auto;
			}
			@media print {
				body {
					background: white;
					padding: 0;
				}
				#root {
					box-shadow: none;
					border: none;
					padding: 0;
				}
			}
		</style>
	</head>
	<body>
		<div id="root">Carregando legislação...</div>
		<script type="module" src="./leg.js"></script>
	</body>
</html>
